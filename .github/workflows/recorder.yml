name: 24/7 Recorder

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: 'Recording duration in hours'
        default: '5'
  push:
    branches: [ main, master ]

concurrency:
  # Prevents multiple instances from fighting over resources
  # If you want strict serial execution, remove run_id
  group: recorder-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p videos/completed database conf emergency-backup
          echo "[INFO] Disk space:"; df -h /

      - name: Verify Supabase credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_API_KEY" ]; then
            echo "[ERROR] Supabase credentials not configured"; exit 1
          fi
          echo "[SUCCESS] Supabase credentials found"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Byparr (Cloudflare bypass)
        continue-on-error: true
        run: |
          docker network create recorder-network 2>/dev/null || true
          docker pull ghcr.io/thephaseless/byparr:latest &
          PULL_PID=$!
          wait $PULL_PID || true
          docker run -d --name byparr --network recorder-network -p 8191:8191 \
            -e HOST=0.0.0.0 -e PORT=8191 -e TIMEOUT=180 -e LOG_LEVEL=INFO \
            ghcr.io/thephaseless/byparr:latest || true

      - name: Build and start recorder
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t goondvr:latest --load .

          BYPARR_URL=""
          docker ps | grep -q byparr && BYPARR_URL="http://byparr:8191/v1"
          EXTRA_ARGS=""
          [ -n "$BYPARR_URL" ] && EXTRA_ARGS="-e FLARESOLVERR_URL=$BYPARR_URL"

          docker run -d --name goondvr \
            --restart=unless-stopped \
            --network recorder-network \
            -p 8080:8080 \
            $EXTRA_ARGS \
            -e SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            -e SUPABASE_API_KEY="${{ secrets.SUPABASE_API_KEY }}" \
            -v $(pwd)/videos:/usr/src/app/videos \
            goondvr:latest --port 8080 --enable-gofile-upload --debug

          echo "⏳ Waiting for app on port 8080..."
          APP_STARTED=false
          for i in $(seq 1 45); do
            if ! docker ps --format '{{.Names}}' | grep -q '^goondvr$'; then
              echo "❌ Container stopped unexpectedly!"
              docker logs goondvr
              exit 1
            fi

            if curl -sf --max-time 5 http://localhost:8080 > /dev/null 2>&1; then
              echo "✅ App ready after $((i * 2)) seconds"
              APP_STARTED=true
              break
            fi

            if [ $((i % 5)) -eq 0 ]; then
              echo "⏳ Still waiting... ($i/45 attempts)"
            fi

            sleep 2
          done

          if [ "$APP_STARTED" = false ]; then
            echo "❌ App never came up after 90 seconds"
            echo "Container status:"; docker ps -a | grep goondvr
            echo "Container logs:"; docker logs goondvr
            exit 1
          fi

          echo "🔍 Verifying API endpoint..."
          if curl -sf --max-time 5 http://localhost:8080/api/stats > /dev/null 2>&1; then
            echo "✅ API endpoint is responding"
          else
            echo "⚠️  Main page works but API may not be fully ready"
          fi

          echo "📋 Container logs (last 50 lines):"
          docker logs goondvr 2>&1 | tail -50

      - name: Install and start Cloudflare Tunnel
        id: cloudflare_tunnel
        continue-on-error: true
        run: |
          echo "🔍 Final verification that app is responding..."
          APP_READY=false
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "✅ App confirmed ready"
              APP_READY=true
              break
            fi
            echo "⏳ Waiting for app... attempt $i/10"
            sleep 3
          done

          if [ "$APP_READY" = false ]; then
            echo "❌ App is not responding on port 8080!"
            echo "Container status:"; docker ps -a | grep goondvr
            echo "Container logs:"; docker logs goondvr --tail 100
            exit 1
          fi

          curl -L --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          create_tunnel() {
            local attempt=$1
            echo ""
            echo "🚀 Starting Cloudflare Tunnel (Attempt $attempt)..."

            pkill -f cloudflared 2>/dev/null || true
            sleep 2

            rm -f tunnel.log tunnel.pid
            cloudflared tunnel --url http://localhost:8080 --no-autoupdate > tunnel.log 2>&1 &
            TUNNEL_PID=$!
            echo $TUNNEL_PID > tunnel.pid
            echo "Tunnel PID: $TUNNEL_PID"

            echo "⏳ Waiting for tunnel URL..."
            local TUNNEL_URL=""
            for i in $(seq 1 18); do
              if [ -f tunnel.log ]; then
                TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
                if [ -n "$TUNNEL_URL" ]; then
                  echo "✅ Tunnel URL found: $TUNNEL_URL"
                  break
                fi
              fi
              sleep 5
            done

            if [ -z "$TUNNEL_URL" ]; then
              echo "❌ Failed to get tunnel URL"
              cat tunnel.log 2>/dev/null || true
              return 1
            fi

            echo "🔍 Verifying tunnel accessibility..."
            local VERIFIED=false

            echo "Checking backend app on localhost:8080..."
            if ! curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "⚠️  Backend app not responding! Tunnel will fail."
              docker logs goondvr --tail 50 || true
            fi

            for i in $(seq 1 20); do
              echo "Testing tunnel (attempt $i/20)..."

              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 "$TUNNEL_URL" 2>&1 | tail -1)
              HTTP_CODE=$(echo "$HTTP_CODE" | grep -oE '[0-9]{3}' | head -1)

              if [ -z "$HTTP_CODE" ]; then
                if [ $i -eq 5 ] || [ $i -eq 10 ]; then
                  echo "Debug: Testing with verbose output..."
                  curl -v --connect-timeout 5 --max-time 10 "$TUNNEL_URL" 2>&1 | head -20 || true
                fi
                echo "⏳ Connection timeout or DNS not resolved yet..."
                sleep 5
                continue
              fi

              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Tunnel is VERIFIED ACCESSIBLE (HTTP 200)"
                VERIFIED=true

                API_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "$TUNNEL_URL/api/stats" 2>&1 | tail -1 | grep -oE '[0-9]{3}' | head -1)
                if [ "$API_CODE" = "200" ]; then
                  echo "✅ API endpoint also verified (HTTP 200)"
                else
                  echo "⚠️  API returned HTTP ${API_CODE:-'no response'} (main page works though)"
                fi

                break
              elif [ "$HTTP_CODE" = "502" ] || [ "$HTTP_CODE" = "503" ] || [ "$HTTP_CODE" = "504" ]; then
                echo "⚠️  Gateway error (HTTP $HTTP_CODE) - backend not responding"
                if ! curl -sf http://localhost:8080 > /dev/null 2>&1; then
                  echo "❌ Backend app died! Cannot proceed."
                  return 1
                fi
              elif [ "$HTTP_CODE" = "000" ]; then
                echo "⚠️  HTTP 000 (connection failed - DNS propagation or network issue)"
              else
                echo "⚠️  HTTP $HTTP_CODE (waiting for 200...)"
              fi

              sleep 5
            done

            if [ "$VERIFIED" = false ]; then
              echo "❌ Tunnel URL exists but is NOT accessible after 100 seconds"
              echo "Last HTTP code received: ${HTTP_CODE:-'none'}"

              echo ""
              echo "🔍 Running diagnostics..."
              echo "1. DNS resolution test:"
              nslookup $(echo "$TUNNEL_URL" | sed 's|https://||' | sed 's|/.*||') || true

              echo ""
              echo "2. Ping test:"
              ping -c 2 $(echo "$TUNNEL_URL" | sed 's|https://||' | sed 's|/.*||') || true

              echo ""
              echo "3. Backend app test:"
              curl -v http://localhost:8080 2>&1 | head -20 || true

              echo ""
              echo "This tunnel is unusable - will retry with new tunnel"
              kill $TUNNEL_PID 2>/dev/null || true
              return 1
            fi

            echo "$TUNNEL_URL" > tunnel_url.txt
            echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV

            return 0
          }

          TUNNEL_SUCCESS=false
          for attempt in 1 2; do
            if create_tunnel $attempt; then
              TUNNEL_SUCCESS=true
              break
            else
              echo "❌ Attempt $attempt failed"
              if [ $attempt -lt 2 ]; then
                echo "⏳ Waiting 10 seconds before retry..."
                sleep 10
              fi
            fi
          done

          if [ "$TUNNEL_SUCCESS" = false ]; then
            echo "⚠️  Failed to verify tunnel accessibility after 2 attempts"
            echo "⚠️  Proceeding anyway - tunnel should become accessible in 1-2 minutes"

            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)

            if [ -z "$TUNNEL_URL" ]; then
              echo "❌ No tunnel URL found at all - cannot proceed"
              exit 1
            fi

            echo "$TUNNEL_URL" > tunnel_url.txt
            echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV

            echo ""
            echo "╔════════════════════════════════════════════════════════════╗"
            echo "║                    🌐 WEB UI ACCESS                        ║"
            echo "╚════════════════════════════════════════════════════════════╝"
            echo ""
            echo "   $TUNNEL_URL"
            echo ""
            echo "   Status: ⏳ PROPAGATING (wait 2-3 minutes then try accessing)"
            echo ""
          else
            TUNNEL_URL=$(cat tunnel_url.txt)

            echo ""
            echo "╔════════════════════════════════════════════════════════════╗"
            echo "║                    🌐 WEB UI ACCESS                        ║"
            echo "╚════════════════════════════════════════════════════════════╝"
            echo ""
            echo "   $TUNNEL_URL"
            echo ""
            echo "   Status: ✅ VERIFIED ACCESSIBLE"
            echo ""
          fi

          echo "💾 Saving tunnel URL to Supabase..."
          SAVE_SUCCESS=false

          for attempt in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/supabase_response.txt \
              -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/tunnel_sessions" \
              -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"run_id\": ${{ github.run_number }}, \"url\": \"$TUNNEL_URL\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}")

            if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
              echo "✅ Tunnel URL saved to Supabase (HTTP $HTTP_CODE)"
              SAVE_SUCCESS=true
              break
            else
              echo "⚠️  Attempt $attempt/5: Failed to save URL (HTTP $HTTP_CODE)"
              cat /tmp/supabase_response.txt 2>/dev/null || true
              [ $attempt -lt 5 ] && sleep 3
            fi
          done

          if [ "$SAVE_SUCCESS" = false ]; then
            echo "⚠️  Could not save URL to Supabase (table may not exist)"
            echo "You can still access the UI using the URL above"
          fi

          (
            while true; do
              sleep 120

              TUNNEL_PID=$(cat tunnel.pid 2>/dev/null || echo "")

              if [ -n "$TUNNEL_PID" ] && ! ps -p $TUNNEL_PID > /dev/null 2>&1; then
                echo "⚠️  Tunnel process died!"

                if create_tunnel "auto-restart"; then
                  TUNNEL_URL=$(cat tunnel_url.txt)
                  echo "✅ New tunnel created: $TUNNEL_URL"

                  curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/tunnel_sessions" \
                    -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
                    -H "Content-Type: application/json" \
                    -H "Prefer: return=minimal" \
                    -d "{\"run_id\": ${{ github.run_number }}, \"url\": \"$TUNNEL_URL\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}" \
                    > /dev/null 2>&1 || true
                fi
                continue
              fi

              CURRENT_URL=$(cat tunnel_url.txt 2>/dev/null || echo "")
              if [ -n "$CURRENT_URL" ]; then
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$CURRENT_URL" 2>/dev/null || echo "000")

                if [ "$HTTP_CODE" != "200" ]; then
                  echo "⚠️  Tunnel not accessible (HTTP $HTTP_CODE), recreating..."

                  [ -n "$TUNNEL_PID" ] && kill $TUNNEL_PID 2>/dev/null || true

                  if create_tunnel "auto-restart"; then
                    TUNNEL_URL=$(cat tunnel_url.txt)
                    echo "✅ New tunnel created: $TUNNEL_URL"

                    curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/tunnel_sessions" \
                      -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
                      -H "Content-Type: application/json" \
                      -H "Prefer: return=minimal" \
                      -d "{\"run_id\": ${{ github.run_number }}, \"url\": \"$TUNNEL_URL\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}" \
                      > /dev/null 2>&1 || true
                  fi
                fi
              fi
            done
          ) &

      - name: Fallback to ngrok if Cloudflare fails
        if: steps.cloudflare_tunnel.outcome == 'failure'
        run: |
          echo "⚠️  Cloudflare Tunnel failed, trying ngrok as fallback..."

          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok -y

          ngrok http 8080 --log=stdout > ngrok.log 2>&1 &
          NGROK_PID=$!
          echo $NGROK_PID > ngrok.pid

          echo "⏳ Waiting for ngrok URL..."
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(curl -s http://localhost:4040/api/tunnels | grep -oP 'https://[a-zA-Z0-9-]+\.ngrok-free\.app' | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ ngrok URL found: $TUNNEL_URL"
              break
            fi
            sleep 2
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get ngrok URL"
            cat ngrok.log
            exit 1
          fi

          echo "🔍 Testing ngrok tunnel..."
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$TUNNEL_URL" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ ngrok tunnel is accessible"
          else
            echo "⚠️  ngrok returned HTTP $HTTP_CODE (may need to click through warning page)"
          fi

          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "$TUNNEL_URL" > tunnel_url.txt

          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                    🌐 WEB UI ACCESS (ngrok)                ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "   $TUNNEL_URL"
          echo ""
          echo "   ⚠️  Note: ngrok free tier shows a warning page first"
          echo "   Click 'Visit Site' to access the UI"
          echo ""

          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/tunnel_sessions" \
            -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"run_id\": ${{ github.run_number }}, \"url\": \"$TUNNEL_URL\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}" \
            > /dev/null 2>&1 || true

      - name: Create GitHub Actions Summary
        if: always()
        run: |
          echo "# 🌐 GoOnDVR Web UI Access" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "$TUNNEL_URL" ]; then
            echo "## ✅ Tunnel Active" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Access your recorder at:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔗 [$TUNNEL_URL]($TUNNEL_URL)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Run ID:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Started:** $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" >> $GITHUB_STEP_SUMMARY
            echo "- **Duration:** ${{ github.event.inputs.duration_hours || '5' }} hours" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ **Note:** This URL is only active while the workflow is running." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Tunnel Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The tunnel could not be established. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Record for 5 hours
        run: |
          graceful_shutdown() {
            echo "⚠️  Saving recordings..."
            docker exec goondvr pkill -SIGTERM -f goondvr 2>/dev/null || true
            sleep 180

            COMPLETED_COUNT=$(docker exec goondvr find /usr/src/app/videos/completed \
              -type f \( -name "*.mp4" -o -name "*.mkv" \) 2>/dev/null | wc -l || echo "0")
            if [ "$COMPLETED_COUNT" -gt 0 ]; then
              echo "📤 Uploading $COMPLETED_COUNT file(s)..."
              curl -s -X POST -m 600 http://localhost:8080/api/upload/completed || true
              sleep 60
            fi

            docker cp goondvr:/usr/src/app/videos/. emergency-backup/ 2>/dev/null || true
            CANCELLED=true
          }

          trap 'graceful_shutdown' SIGTERM SIGINT
          CANCELLED=false

          DURATION_HOURS="${{ github.event.inputs.duration_hours }}"
          DURATION_HOURS="${DURATION_HOURS:-5}"
          END_TIME=$(($(date +%s) + DURATION_HOURS * 3600))
          LAST_CLEANUP=0
          LAST_HEARTBEAT=0

          while [ $(date +%s) -lt $END_TIME ] && [ "$CANCELLED" = false ]; do
            if ! docker ps --format '{{.Names}}' | grep -q '^goondvr$'; then
              echo "⚠️  Container stopped unexpectedly!"
              docker logs --tail 100 goondvr

              docker start goondvr 2>/dev/null || {
                echo "❌ Failed to restart container, exiting"
                break
              }

              for i in $(seq 1 30); do
                if curl -sf http://localhost:8080 > /dev/null 2>&1; then
                  echo "✅ Container restarted successfully"
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "❌ Container failed to restart properly"
                  break
                fi
                sleep 2
              done
            fi

            CURRENT_TIME=$(date +%s)

            DISK_USED=$(df / | awk 'NR==2{print $5}' | tr -d '%')
            if [ "$DISK_USED" -gt 80 ]; then
              echo "⚠️  Disk at ${DISK_USED}%, triggering early upload..."
              curl -s -X POST -m 120 http://localhost:8080/api/upload/completed > /dev/null 2>&1 || true
            fi

            if [ $((CURRENT_TIME - LAST_CLEANUP)) -gt 1800 ]; then
              COMPLETED_COUNT=$(docker exec goondvr find /usr/src/app/videos/completed \
                -type f \( -name "*.mp4" -o -name "*.mkv" \) 2>/dev/null | wc -l || echo "0")
              if [ "$COMPLETED_COUNT" -gt 0 ]; then
                echo "📤 Uploading $COMPLETED_COUNT completed file(s)..."
                curl -s -X POST -m 120 http://localhost:8080/api/upload/completed > /dev/null 2>&1 &
              fi
              LAST_CLEANUP=$CURRENT_TIME
            fi

            if [ $((CURRENT_TIME - LAST_HEARTBEAT)) -gt 300 ]; then
              TUNNEL_URL=$(cat tunnel_url.txt 2>/dev/null || echo "")
              curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeats" \
                -H "apikey: ${{ secrets.SUPABASE_API_KEY }}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"run_id\": ${{ github.run_number }}, \"timestamp\": \"$(date -u +%FT%TZ)\", \"tunnel_url\": \"$TUNNEL_URL\", \"disk_used_pct\": $DISK_USED}" \
                > /dev/null 2>&1 || true
              LAST_HEARTBEAT=$CURRENT_TIME
            fi

            sleep 60
          done

          echo "📤 Performing final upload..."
          COMPLETED_COUNT=$(docker exec goondvr find /usr/src/app/videos/completed \
            -type f \( -name "*.mp4" -o -name "*.mkv" \) 2>/dev/null | wc -l || echo "0")
          if [ "$COMPLETED_COUNT" -gt 0 ]; then
            echo "📤 Uploading $COMPLETED_COUNT final file(s)..."
            curl -s -X POST -m 300 http://localhost:8080/api/upload/completed || true
            sleep 60
          else
            echo "✅ No files to upload"
          fi

      - name: Trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "🔍 Checking for pending workflow runs..."
          # Ensure GitHub CLI is available (usually is, but check just in case)
          if ! command -v gh &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y gh
          fi

          CURRENT_RUN_ID=${{ github.run_id }}

          PENDING_RUNS=$(gh run list \
            --workflow="24/7 Recorder" \
            --status queued \
            --status in_progress \
            --json databaseId \
            --jq "[.[] | select(.databaseId != $CURRENT_RUN_ID) | .databaseId] | length" \
            2>/dev/null || echo "0")

          echo "Found $PENDING_RUNS pending runs (excluding current: $CURRENT_RUN_ID)"

          if [ "$PENDING_RUNS" -gt 0 ]; then
            echo "✅ Next run already queued/running, skipping trigger"
          else
            echo "🔁 No other pending runs, triggering next run..."
            gh workflow run "${{ github.workflow }}" --repo "${{ github.repository }}"
            echo "✅ Next run queued"
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop --time=60 goondvr byparr 2>/dev/null || true
          docker rm -f goondvr byparr 2>/dev/null || true
          docker network rm recorder-network 2>/dev/null || true
          docker system prune -af --volumes 2>/dev/null || true
          pkill -f cloudflared 2>/dev/null || true
          rm -rf videos/* database/* 2>/dev/null || true

      - name: Upload artifacts (emergency fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recordings-${{ github.run_number }}
          path: emergency-backup/
          retention-days: 30
          if-no-files-found: ignore
